<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LecturAI - Lecture View</title>
    <link rel="stylesheet" href="/static/lecture.css?v=11" />
  </head>
  <body>
    <div class="lecture-shell">
      <header class="lecture-topbar">
        <div class="lecture-brand">
          <div class="lecture-brand-logo">NN</div>
          <div class="lecture-brand-text">LecturAI</div>
        </div>

        <div class="lecture-head-meta">
          <h1 id="lectureTitle" class="lecture-title">Loading lecture...</h1>
          <p id="lectureSubhead" class="lecture-subhead">Module 1</p>
        </div>

        <div class="lecture-head-actions">
          <a class="back-btn" href="/">My Lectures</a>
          <div class="lecture-tabs" role="tablist" aria-label="Panel tabs">
            <button class="lecture-tab lecture-tab-active" id="tabScript" type="button" data-tab="script">Script</button>
            <button class="lecture-tab" id="tabNotes" type="button" data-tab="notes">Notes</button>
            <button class="lecture-tab" id="tabResources" type="button" data-tab="resources">Resources</button>
          </div>
          <a id="downloadPdfBtn" class="download-btn" href="#" target="_blank" rel="noopener">Download PDF</a>
          <button class="menu-btn" type="button" aria-label="More options">&#8942;</button>
        </div>
      </header>

      <main class="lecture-main">
        <section class="slide-pane">
          <div id="slideFrame" class="slide-frame">
            <div id="imageContainer" class="slide-canvas">
              <img id="mainImage" class="slide-image" alt="Slide preview" />
              <canvas id="textTransitionCanvas" class="text-transition-canvas" aria-hidden="true"></canvas>
              <div id="highlightOverlay" class="highlight-overlay" aria-hidden="true"></div>
            </div>
            <p id="slideMessage" class="slide-message">Loading slide...</p>
          </div>
        </section>

        <aside class="script-pane">
          <div class="script-pane-head">
            <h2 id="scriptTitle">Lecture Script</h2>
            <button id="scriptSearchBtn" type="button">Search</button>
          </div>
          <div id="scriptPanel" class="script-panel"></div>
        </aside>
      </main>

      <section class="timeline-strip">
        <div class="timeline-top">
          <p id="slideCounter" class="slide-counter">Slide 1</p>
          <p id="stepCounter" class="step-counter">00:00 - 00:00</p>
        </div>
        <div id="dotsTrack" class="dots-track"></div>
      </section>

      <footer class="lecture-controls">
        <div class="track-info">
          <p id="trackTitle" class="track-title">Lecture</p>
          <p id="trackTime" class="track-time">00:00 / 00:00</p>
        </div>
        <div class="transport">
          <button id="prevSlideBtn" type="button" aria-label="Previous slide">&#9664;</button>
          <button id="playBtn" class="play-btn" type="button" aria-label="Play script">&#9658;</button>
          <button id="nextSlideBtn" type="button" aria-label="Next slide">&#9654;</button>
        </div>
        <div class="right-controls">
          <span id="rateLabel">1.0x</span>
          <input id="speedRange" type="range" min="50" max="500" step="5" value="100" aria-label="Playback speed" />
        </div>
      </footer>
    </div>

    <script src="/static/lecture.js?v=19"></script>
  </body>
</html>
