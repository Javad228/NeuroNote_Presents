<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NeuroNote Dashboard</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-row">
          <div class="brand-logo">NN</div>
          <div class="brand-text">NeuroNote</div>
        </div>

        <div class="sidebar-group">
          <div class="group-title">My Projects</div>
          <button class="nav-item nav-item-active" type="button">Dashboard</button>
          <button class="nav-item" type="button">Recent</button>
          <button class="nav-item" type="button">Favorites</button>
          <button class="nav-item" type="button">Archived</button>
        </div>

        <div class="sidebar-group sidebar-group-bottom">
          <button class="nav-item" type="button">Settings</button>
          <button class="nav-item" type="button">Help &amp; Tutorials</button>
        </div>

        <div class="profile-card">
          <div class="profile-avatar">J</div>
          <div>
            <div class="profile-name">Local User</div>
            <div class="profile-plan">Free Plan</div>
          </div>
        </div>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <h1>Dashboard</h1>
            <p class="subhead">overview</p>
          </div>

          <div class="topbar-actions">
            <input id="searchInput" class="search-input" type="text" placeholder="Search projects..." />
            <button id="newProjectBtn" class="new-project-btn" type="button">+ New Project</button>
          </div>
        </header>

        <section class="content-section">
          <div class="section-header">
            <h2>Recent Jobs</h2>
          </div>

          <p id="status" class="status-text">Loading jobs...</p>

          <div id="jobsGrid" class="jobs-grid" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
